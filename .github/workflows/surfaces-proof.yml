name: Surfaces Proof Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  p0-proof:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P0 contract gate
        run: npm run check:p0:ci

  p1-proof:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P1 contract gate
        run: npm run check:p1:ci

  p2-proof:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P2 contract gate
        run: npm run check:p2:ci

  p3-proof:
    runs-on: ubuntu-latest
    needs: p2-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P3 contract gate
        run: npm run check:p3:ci:phase

  source-conformance-proof:
    runs-on: ubuntu-latest
    needs: p2-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run source conformance contract gate
        run: npm run check:source-conformance:ci:phase

  p4-proof:
    runs-on: ubuntu-latest
    needs: p3-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P4 contract gate
        run: npm run check:p4:ci:phase

  p5-protocol-proof:
    runs-on: ubuntu-latest
    needs: p4-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P5 protocol contract gate
        run: npm run check:p5:protocol:ci:phase

  surfaceops-kanban-static-proof:
    runs-on: ubuntu-latest
    needs: p4-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SurfaceOps kanban static contract gate
        run: npm run check:surfaceops-kanban-static:ci:phase

  p5-native-proof:
    runs-on: ubuntu-latest
    needs: p5-protocol-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P5 native contract gate
        run: npm run check:p5:native:ci:phase

  designer-workflow-trace-proof:
    runs-on: ubuntu-latest
    needs:
      - source-conformance-proof
      - p5-native-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run designer workflow trace contract gate
        run: npm run check:designer-workflow-trace:ci:phase
