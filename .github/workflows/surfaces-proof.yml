name: Surfaces Proof Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  p0-proof:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P0 contract gate
        run: npm run check:p0:ci

  p1-proof:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P1 contract gate
        run: npm run check:p1:ci

  p2-proof:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P2 contract gate
        run: npm run check:p2:ci

  p3-proof:
    runs-on: ubuntu-latest
    needs: p2-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P3 contract gate
        run: npm run check:p3:ci:phase

  source-conformance-proof:
    runs-on: ubuntu-latest
    needs: p2-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run source conformance contract gate
        run: npm run check:source-conformance:ci:phase

  source-family-packaging-proof:
    runs-on: ubuntu-latest
    needs: source-conformance-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run source-family packaging contract gate
        run: npm run check:source-family-packaging:ci:phase

  source-family-layout-mapping-proof:
    runs-on: ubuntu-latest
    needs: source-family-packaging-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run source-family layout-mapping contract gate
        run: npm run check:source-family-layout-mapping:ci:phase

  source-family-namespace-mapping-proof:
    runs-on: ubuntu-latest
    needs: source-family-layout-mapping-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run source-family namespace-mapping contract gate
        run: npm run check:source-family-namespace-mapping:ci:phase

  source-family-component-identity-mapping-proof:
    runs-on: ubuntu-latest
    needs: source-family-namespace-mapping-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run source-family component-identity-mapping contract gate
        run: npm run check:source-family-component-identity-mapping:ci:phase

  source-accessibility-policy-proof:
    runs-on: ubuntu-latest
    needs: source-family-packaging-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run source accessibility policy contract gate
        run: npm run check:source-accessibility-policy:ci:phase

  p4-proof:
    runs-on: ubuntu-latest
    needs: p3-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P4 contract gate
        run: npm run check:p4:ci:phase

  p5-protocol-proof:
    runs-on: ubuntu-latest
    needs: p4-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P5 protocol contract gate
        run: npm run check:p5:protocol:ci:phase

  surfaceops-kanban-static-proof:
    runs-on: ubuntu-latest
    needs: p4-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SurfaceOps kanban static contract gate
        run: npm run check:surfaceops-kanban-static:ci:phase

  surfaceops-kanban-static-browser-functional:
    runs-on: ubuntu-latest
    needs: surfaceops-kanban-static-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for browser functional proof
        run: npx playwright install --with-deps chromium

      - name: Run SurfaceOps kanban browser functional proof
        run: npm run check:surfaceops-kanban-static:browser

      - name: Upload SurfaceOps kanban browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surfaceops-kanban-static-browser-functional-evidence
          path: output/playwright/surfaceops-kanban-static/

  surfaceops-kanban-live-proof:
    runs-on: ubuntu-latest
    needs: p4-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SurfaceOps kanban live contract gate
        run: npm run check:surfaceops-kanban-live:ci:phase

  surfaceops-kanban-live-browser-functional:
    runs-on: ubuntu-latest
    needs: surfaceops-kanban-live-proof
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Check out kanban.cards
        uses: actions/checkout@v5
        with:
          repository: Surfaces-Platform/kanban.cards
          ref: 3b2a6f78693f0032439a1149eaed896f532aac09
          path: kanban.cards
          token: ${{ secrets.KANBAN_CARDS_READ_TOKEN }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install kanban.cards dependencies
        run: npm ci
        working-directory: kanban.cards

      - name: Build kanban.cards browser bundle
        run: npm run build
        working-directory: kanban.cards

      - name: Install Chromium for browser functional proof
        run: npx playwright install --with-deps chromium

      - name: Run SurfaceOps kanban live browser functional proof
        env:
          KANBAN_CARDS_ROOT: kanban.cards
        run: npm run check:surfaceops-kanban-live:browser

      - name: Upload SurfaceOps kanban live browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surfaceops-kanban-live-browser-functional-evidence
          path: output/playwright/surfaceops-kanban-live/

  p5-native-proof:
    runs-on: ubuntu-latest
    needs: p5-protocol-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run P5 native contract gate
        run: npm run check:p5:native:ci:phase

  designer-workflow-trace-proof:
    runs-on: ubuntu-latest
    needs:
      - source-family-packaging-proof
      - p5-native-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run designer workflow trace contract gate
        run: npm run check:designer-workflow-trace:ci:phase

  surfaceops-designer-review-ui-proof:
    runs-on: ubuntu-latest
    needs:
      - designer-workflow-trace-proof
      - surfaceops-kanban-live-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SurfaceOps designer review UI contract gate
        run: npm run check:surfaceops-designer-review-ui:ci:phase

  capability-index-proof:
    runs-on: ubuntu-latest
    needs:
      - designer-workflow-trace-proof
      - source-family-layout-mapping-proof
      - source-family-namespace-mapping-proof
      - source-family-component-identity-mapping-proof
      - source-accessibility-policy-proof
      - surfaceops-kanban-static-proof
      - surfaceops-designer-review-ui-proof

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run capability index contract gate
        run: npm run check:capability-index:ci:phase

  surfaceops-designer-review-ui-browser-functional:
    runs-on: ubuntu-latest
    needs: surfaceops-designer-review-ui-proof
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Check out kanban.cards
        uses: actions/checkout@v5
        with:
          repository: Surfaces-Platform/kanban.cards
          ref: 3b2a6f78693f0032439a1149eaed896f532aac09
          path: kanban.cards
          token: ${{ secrets.KANBAN_CARDS_READ_TOKEN }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install kanban.cards dependencies
        run: npm ci
        working-directory: kanban.cards

      - name: Build kanban.cards browser bundle
        run: npm run build
        working-directory: kanban.cards

      - name: Install Chromium for browser functional proof
        run: npx playwright install --with-deps chromium

      - name: Run SurfaceOps designer review UI browser functional proof
        env:
          KANBAN_CARDS_ROOT: kanban.cards
        run: npm run check:surfaceops-designer-review-ui:browser

      - name: Upload SurfaceOps designer review UI browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surfaceops-designer-review-ui-browser-functional-evidence
          path: output/playwright/surfaceops-designer-review-ui/
          if-no-files-found: error
